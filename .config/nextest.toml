[profile.default]
# Kill individual tests after 120 seconds to allow bootstrap-heavy oracle
# tests enough time to complete.
slow-timeout = { period = "60s", terminate-after = 2 }

# Run the bootstrap loadup test first since it is the slowest test (~50s).
# Starting it early prevents it from becoming a bottleneck at the end.
[[profile.default.overrides]]
filter = 'test(neovm_loadup_bootstrap)'
priority = 100
